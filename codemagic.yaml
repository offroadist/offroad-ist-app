workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic iOS
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.offroad.offroadist
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Fix bundle ID in Xcode project
        script: |
          find ios -name "project.pbxproj" -exec sed -i 's/com\.offroad\.offroadIst/com.offroad.offroadist/g' {} \;
          grep "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
